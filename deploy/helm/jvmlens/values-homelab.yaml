# One-flag profiled deployment of unitrack in the homelab, as a SEPARATE release.
#
#   scripts/deploy-agent.sh --release unitrack-profiled
#   # or:
#   helm upgrade --install unitrack-profiled deploy/helm/jvmlens \
#     -n unitrack -f deploy/helm/jvmlens/values-homelab.yaml
#
# Reuses the live unitrack release's ConfigMap (full UNITRACK_* env: DB URL, etc.) and the
# DB password from its Secret, so the profiled copy starts with the same config.
#
# !! CAUTION: it talks to the SAME PostgreSQL as production unitrack — two app instances can
#    race on Flyway startup migration. For anything beyond a quick look, point it at a
#    throwaway DB (override target.env UNITRACK_DB_URL) rather than the live one.

target:
  image: nas1.home.int:5000/unitrack:0.2.0-SNAPSHOT
  port: 8080
  envFrom:
    - configMapRef:
        name: unitrack
  env:
    # The configmap doesn't hold the DB password; map it from the chart-managed Secret
    # (key `db-password`, the unitrack chart default) to the env name the app expects.
    - name: UNITRACK_DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: unitrack
          key: db-password

agent:
  image: nas1.home.int:5000/jvmlens-agent:0.1.0-SNAPSHOT
  options: "out=/agent/jvmlens.md,interval=300"
  # Optional non-breaking variable snapshots on hot endpoints:
  # snapshot: "org.alexmond.unitrack.web.ReportController#ingest"

imagePullSecrets:
  - name: zot-regcred
