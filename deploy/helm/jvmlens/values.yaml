# jvmlens — standalone "profile a JVM workload" deployment.
#
# It runs your app image with the jvmlens agent attached and a tiny sidecar that
# serves the rolling summary over HTTP. This is a SEPARATE release; it does not
# touch your app's main deployment.

replicaCount: 1

# Registry pull secret(s). The homelab Zot registry (registry.example.com:5000) needs `my-regcred`
# in the target namespace — the same secret the unitrack release uses.
imagePullSecrets:
  - name: my-regcred

# The JVM workload to profile. Default is the homelab unitrack image, but point `target.image`
# at any JVM app. Supply the app's own env/config via `env` / `envFrom` (e.g. reuse the
# app release's ConfigMap/Secret) so it actually starts.
target:
  image: registry.example.com:5000/unitrack:0.2.0-SNAPSHOT
  imagePullPolicy: IfNotPresent
  args: []
  # Plain env pairs for the app (DB URL, etc.).
  env: []
  #  - name: UNITRACK_DB_URL
  #    value: jdbc:postgresql://unitrack-postgres:5432/unitrack
  # Pull whole ConfigMaps/Secrets from the app's existing release.
  envFrom: []
  #  - configMapRef: { name: unitrack }
  #  - secretRef: { name: unitrack }
  port: 8080
  resources: {}

# The jvmlens agent. Build + push with scripts/deploy-agent.sh (tiny OCI image holding
# jvmlens-agent.jar at /jvmlens-agent.jar; see deploy/agent-image/Dockerfile).
agent:
  image: registry.example.com:5000/jvmlens-agent:0.1.0-SNAPSHOT
  imagePullPolicy: IfNotPresent
  # Appended after `-javaagent:/agent/jvmlens-agent.jar=`. See `jvmlens` agent docs.
  options: "out=/agent/jvmlens.md,interval=300"
  # Optional non-breaking variable snapshots: "pkg.Class#method;pkg.Other#m".
  snapshot: ""

# Tiny sidecar that serves the summary file over HTTP, so you can read the
# LLM-ready report at http://<svc>:<port>/jvmlens.md without exec-ing into the pod.
summary:
  enabled: true
  image: busybox:1.37
  port: 8090

service:
  type: ClusterIP

# The shared scratch volume holding the agent jar + the summary. fsGroup lets the
# (non-root) app user write the summary into the dir the init container created.
podSecurityContext:
  fsGroup: 1000

nodeSelector: {}
tolerations: []
affinity: {}
