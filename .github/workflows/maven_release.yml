name: Maven Release

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release version'
        required: true
      nextVersion:
        description: 'Next development version (with -SNAPSHOT suffix)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the version-bump commits + tag, and create the GitHub release
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Important for git history

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          server-id: central
          server-username: OSSRH_USERNAME
          server-password: OSSRH_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Configure Git User
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Prepare Release
        run: |
          mvn versions:set -DnewVersion=${{ github.event.inputs.releaseVersion }} -DprocessAllModules=true --no-transfer-progress
          git commit -am "Prepare release ${{ github.event.inputs.releaseVersion }}"
          git tag -a ${{ github.event.inputs.releaseVersion }} -m "Release ${{ github.event.inputs.releaseVersion }}"

      - name: Copy Maven settings.xml
        run: |
          env
          mkdir -p ~/.m2
          cp .github/settings.xml ~/.m2/settings.xml

      # Central scope = parent + jvmlens-engine only (the dependency-free library). The app/tool
      # jars (cli fat jar, agent + jmh shaded jars) set maven.deploy.skip=true in their POMs and
      # ship as GitHub release assets instead (attached below). `clean deploy` still BUILDS them,
      # so the jars exist in target/ for the release step.
      - name: Deploy to Maven Central
        run: mvn --batch-mode -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }} clean deploy -Prelease --no-transfer-progress
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Prepare for Next Development Version
        run: |
          mvn versions:set -DnewVersion=${{ github.event.inputs.nextVersion }} -DprocessAllModules=true --no-transfer-progress
          git commit -am "Prepare for next development iteration: ${{ github.event.inputs.nextVersion }}"

      - name: Push Changes
        run: git push && git push --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.releaseVersion }}
          name: Release ${{ github.event.inputs.releaseVersion }}
          generate_release_notes: true
          # The app/tool jars are not on Central — attach them to the tagged release so
          # `gh release download v<x> -p 'jvmlens.jar'` (see docs Installation) works.
          files: |
            jvmlens-cli/target/jvmlens.jar
            jvmlens-agent/target/jvmlens-agent.jar
            jvmlens-jmh/target/jvmlens-jmh.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
