name: lab-scan

# Builder analog of .github/workflows/lab-scan.yml.
# Blocks pushes that introduce new lab-internal references. The denylist + baseline are
# lab-private, so they are NOT in the repo — they come from secrets LAB_DENY_PATTERNS
# (required) and LAB_SCAN_BASELINE (optional). If LAB_DENY_PATTERNS is unset the scan
# self-skips, so the gate can be wired before the secret exists.
#
# GAP: builder's native `uses: secret-scan` runs a fixed built-in ruleset and can't take
# an external/secret-supplied denylist + baseline, so this keeps the workflow's own shell
# gate verbatim rather than mapping onto the builtin.
on: [push, manual]
push:
  branches: [main]

jobs:
  lab-scan:
    image: alpine:3.20
    secrets: [LAB_DENY_PATTERNS, LAB_SCAN_BASELINE]
    steps:
      - name: Checkout
        run: |
          apk add --no-cache git grep
          git clone --depth 1 https://github.com/alexmond/jvmlens.git .
      - name: Scan tracked files for lab-internal references
        run: |
          set -euo pipefail
          if [ -z "${LAB_DENY_PATTERNS:-}" ]; then
            echo "LAB_DENY_PATTERNS secret not set — skipping lab-scan (add it to enable the gate)."
            exit 0
          fi
          pat="$(mktemp)"
          printf '%s' "$LAB_DENY_PATTERNS" | grep -vE '^[[:space:]]*(#|$)' > "$pat" || true
          hits="$(git ls-files | while IFS= read -r f; do
                    { grep -hoiE -f "$pat" -- "$f" 2>/dev/null || true; } | sort -u |
                      while IFS= read -r m; do printf '%s\t%s\n' "$f" "$m"; done
                  done | LC_ALL=C sort -u)"
          base="$(printf '%s' "${LAB_SCAN_BASELINE:-}" | LC_ALL=C sort -u)"
          new="$(LC_ALL=C comm -23 <(printf '%s\n' "$hits" | grep -v '^$' || true) \
                                   <(printf '%s\n' "$base" | grep -v '^$' || true) || true)"
          if [ -n "$new" ]; then
            echo "lab-scan: new lab-internal reference(s):"
            printf '%s\n' "$new" | sed 's/^/  /'
            exit 1
          fi
          echo "lab-scan: no new lab-internal references"
